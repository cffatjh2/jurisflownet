# Future-use blueprint for the canonical production cutover.
# Do not apply this file until the user explicitly starts the production cutover.

services:
  - type: web
    name: jurisflow-canonical-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: postgres
      - key: Database__BootstrapMode
        value: migrate
      - key: Database__ApplyMigrationsOnStartup
        value: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Cors__AllowedOriginsCsv
        sync: false
      - key: Storage__Provider
        value: supabase
      - key: Storage__Supabase__Url
        sync: false
      - key: Storage__Supabase__ServiceRoleKey
        sync: false
      - key: Storage__Supabase__Bucket
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: JurisFlowServer
      - key: Jwt__Audience
        value: JurisFlowClient
      - key: Tenancy__DefaultTenantSlug
        sync: false
      - key: Tenancy__DefaultTenantName
        sync: false
      - key: Seed__Enabled
        value: false
      - key: Security__MfaEnforced
        value: true
      - key: Security__DocumentEncryptionEnabled
        value: true
      - key: Security__DbEncryptionEnabled
        value: true
      - key: Security__AuditLogImmutable
        value: true
      - key: Security__AuditLogFailClosed
        value: true
      - key: Security__DocumentEncryptionKey
        sync: false
      - key: Security__DbEncryptionKey
        sync: false
      - key: Security__AuditLogKey
        sync: false
      - key: Features__RefactorWave__UseLegacyTaskAssignmentAdapter
        value: true
      - key: Features__RefactorWave__UseLegacyMatterResponsibilityAdapter
        value: true
      - key: Features__RefactorWave__UseTenantCompanySynchronization
        value: true
      - key: Features__RefactorWave__RestrictLeadDeleteToPrivilegedRoles
        value: true
