# Nixpacks fallback configuration (.NET single-stack)
[phases.install]
cmds = ['dotnet restore JurisFlow.Server/JurisFlow.Server.csproj']

[phases.build]
cmds = ['dotnet publish JurisFlow.Server/JurisFlow.Server.csproj -c Release -o out /p:UseAppHost=false']

[start]
cmd = 'dotnet out/JurisFlow.Server.dll'
