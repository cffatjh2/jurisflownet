services:
  - type: web
    name: jurisflow-staging
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: Database__Provider
        value: postgres
      - key: Database__BootstrapMode
        value: migrate
      - key: Database__ApplyMigrationsOnStartup
        value: false
      - key: Cors__AllowedOriginsCsv
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: ForwardedHeaders__TrustAllProxies
        value: true
      - key: ForwardedHeaders__AllowTrustAllProxiesInProduction
        value: true
      - key: Storage__Provider
        value: supabase
      - key: Storage__Supabase__Url
        sync: false
      - key: Storage__Supabase__ServiceRoleKey
        sync: false
      - key: Storage__Supabase__Bucket
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Seed__Enabled
        value: false
      - key: Security__DocumentEncryptionKey
        sync: false
      - key: Security__DbEncryptionKey
        sync: false
      - key: Security__AuditLogKey
        sync: false

  - type: web
    name: jurisflow-prod
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: postgres
      - key: Database__BootstrapMode
        value: migrate
      - key: Database__ApplyMigrationsOnStartup
        value: false
      - key: ForwardedHeaders__TrustAllProxies
        value: true
      - key: ForwardedHeaders__AllowTrustAllProxiesInProduction
        value: true
      - key: Cors__AllowedOriginsCsv
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Storage__Provider
        value: supabase
      - key: Storage__Supabase__Url
        sync: false
      - key: Storage__Supabase__ServiceRoleKey
        sync: false
      - key: Storage__Supabase__Bucket
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Seed__Enabled
        value: false
      - key: Seed__PortalClientEnabled
        value: false
      - key: Seed__ResetPasswords
        value: false
      - key: Seed__AdminEmail
        value: ""
      - key: Seed__AdminPassword
        value: ""
      - key: Seed__PortalClientEmail
        value: ""
      - key: Seed__PortalClientPassword
        value: ""
      - key: Security__MfaEnforced
        value: true
      - key: Security__DocumentEncryptionEnabled
        value: true
      - key: Security__DbEncryptionEnabled
        value: true
      - key: Security__AuditLogImmutable
        value: true
      - key: Security__AuditLogFailClosed
        value: true
      - key: Security__DocumentEncryptionKey
        sync: false
      - key: Security__DbEncryptionKey
        sync: false
      - key: Security__AuditLogKey
        sync: false
