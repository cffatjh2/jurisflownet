name: CD Render

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: Render environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy Staging to Render
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       secrets.RENDER_STAGING_DEPLOY_HOOK_URL != '') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'staging' &&
       secrets.RENDER_STAGING_DEPLOY_HOOK_URL != '')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy Production to Render
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production' &&
      secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
